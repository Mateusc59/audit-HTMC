<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Audits - HTMC Agency</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Générateur d'Audits</h1>
            <p class="subtitle">Créez des audits professionnels en quelques minutes</p>
        </header>

        <!-- FORMULAIRE -->
        <div class="form-section">
            <h2 class="section-title">
                <span class="section-number">1</span>
                Informations de base
            </h2>
            
            <div class="info-box">
                <strong>💡 Astuce :</strong> Utilisez "Auto-remplir" pour gagner du temps !
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="companyName">Nom entreprise *</label>
                    <input type="text" id="companyName" placeholder="Ex: CAPICSA" required>
                </div>

                <div class="form-group">
                    <label for="industry">Secteur *</label>
                    <select id="industry" required>
                        <option value="">Sélectionnez...</option>
                        <option value="construction">Construction & Rénovation</option>
                        <option value="immobilier">Immobilier</option>
                        <option value="plomberie">Plomberie</option>
                        <option value="electricite">Électricité</option>
                        <option value="menuiserie">Menuiserie</option>
                        <option value="peinture">Peinture</option>
                        <option value="architecture">Architecture</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Localisation *</label>
                    <input type="text" id="location" placeholder="Ex: Andorre" required>
                </div>

                <div class="form-group">
                    <label for="yearsExperience">Années d'expérience</label>
                    <input type="number" id="yearsExperience" placeholder="Ex: 60" min="0">
                </div>

                <div class="form-group">
                    <label for="websiteUrl">URL du site</label>
                    <input type="url" id="websiteUrl" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label for="logoUpload">Logo entreprise</label>
                    <input type="file" id="logoUpload" accept="image/*" style="padding: 14px; cursor: pointer;">
                </div>
            </div>

            <button class="btn auto-fill-btn" id="autoFillBtn">🤖 Auto-remplir</button>

            <div class="form-group" style="margin-top: 24px;">
                <label for="services">Services *</label>
                <textarea id="services" placeholder="Construction, rénovation..." required></textarea>
            </div>

            <div class="form-group">
                <label for="uniqueValue">Valeur unique</label>
                <textarea id="uniqueValue" placeholder="60 ans d'expérience..."></textarea>
            </div>

            <div class="form-group">
                <label for="mainGoals">Objectifs *</label>
                <textarea id="mainGoals" placeholder="Augmenter les devis..." required></textarea>
            </div>
        </div>

        <!-- SCREENSHOT -->
        <div class="form-section">
            <h2 class="section-title">
                <span class="section-number">2</span>
                Screenshot du site (optionnel)
            </h2>
            
            <div class="form-group">
                <label for="screenshotUpload">Capture d'écran du site actuel</label>
                <input type="file" id="screenshotUpload" accept="image/*" style="padding: 14px; cursor: pointer;">
                <div id="screenshotPreview" style="margin-top: 20px;"></div>
            </div>
        </div>

        <!-- PROBLEMES & SOLUTIONS -->
        <div class="form-section">
            <h2 class="section-title">
                <span class="section-number">3</span>
                Problèmes & Solutions
            </h2>

            <div class="form-group">
                <label>Problèmes * (cochez tous ceux qui s'appliquent)</label>
                <div class="checkbox-grid" id="problemsCheckboxes">
                    <!-- Sera rempli par JavaScript -->
                </div>
            </div>

            <div class="form-group" style="margin-top: 24px;">
                <label>Solutions proposées</label>
                <div class="checkbox-grid" id="solutionsCheckboxes">
                    <!-- Sera rempli par JavaScript -->
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn" id="generateBtn">✨ Générer l'Audit</button>
        </div>

        <!-- LOADING -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="font-size: 1.2rem; font-weight: 600;">Génération en cours...</p>
        </div>

        <!-- RESULT -->
        <div class="result" id="result">
            <div id="pdfContent" class="pdf-preview"></div>
            <div class="action-buttons">
                <button class="btn btn-print" onclick="window.print()">🖨️ Imprimer / PDF</button>
                <button class="btn btn-download-fr" id="downloadBtnFR">📥 Télécharger (FR)</button>
                <button class="btn btn-download-ca" id="downloadBtnCA">📥 Descarregar (CA)</button>
                <button class="btn btn-new" id="newAuditBtn">🔄 Nouvel Audit</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='data.js') }}"></script>
    <script src="{{ url_for('static', filename='templates.js') }}"></script>
    <script src="{{ url_for('static', filename='pdf-download.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
